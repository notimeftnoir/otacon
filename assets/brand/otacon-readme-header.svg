<svg width="620" height="150" viewBox="0 0 620 150" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Otacon — domain impersonation detector">

  <!-- Background — pure dark, no border -->
  <rect width="620" height="150" fill="#0d0d0d"/>

  <!-- ── Mark (left section, centre 76,75) ── -->
  <!-- outer flat-top hexagon, r=52 -->
  <polygon
    points="128,75 102,120.08 50,120.08 24,75 50,29.92 102,29.92"
    fill="none" stroke="#00d7af" stroke-width="2"/>
  <!-- inner pointy-top hexagon, r=19, rotated 30° -->
  <polygon
    points="76,56 92.45,65.5 92.45,84.5 76,94 59.55,84.5 59.55,65.5"
    fill="#00d7af"/>

  <!-- ── Thin vertical separator ── -->
  <line x1="158" y1="26" x2="158" y2="124"
    stroke="#00875f" stroke-width="1" opacity="0.45"/>

  <!-- ── OTACON wordmark ── -->
  <text x="178" y="83"
    font-family="'Courier New',Courier,monospace"
    font-size="46"
    font-weight="bold"
    fill="#ffffff"
    letter-spacing="12">OTACON</text>

  <!-- ── Teal rule beneath wordmark ── -->
  <line x1="178" y1="93" x2="432" y2="93"
    stroke="#00d7af" stroke-width="0.8"/>

  <!-- ── Descriptor ── -->
  <text x="178" y="115"
    font-family="'Courier New',Courier,monospace"
    font-size="11"
    fill="#8a8a8a"
    letter-spacing="2.5">DOMAIN IMPERSONATION DETECTOR</text>

</svg>
