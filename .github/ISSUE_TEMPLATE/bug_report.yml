name: Bug report
description: Something doesn't work as expected
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        **Before filing:** check that you're on the latest version (`otacon --version`) and that your issue isn't already listed.

  - type: input
    id: version
    attributes:
      label: Otacon version
      placeholder: "e.g. 1.0.0"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version & OS
      placeholder: "e.g. Python 3.12 / Ubuntu 24.04"
    validations:
      required: true

  - type: input
    id: command
    attributes:
      label: Command run
      placeholder: "otacon scan example.com --json out.json"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour (include full error output)
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Paste relevant log output, tracebacks, or a minimal reproduction script.
